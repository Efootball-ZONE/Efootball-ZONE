<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Efootball ZONE - Contact</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="contact">

  <header class="site-header">
    <div class="container topbar">
      <a href="index.html" class="brand">Efootball ZONE</a>

      <div class="header-actions">
        <div class="lang-switcher">
          <button type="button" onclick="setLanguage('en')">EN</button>
          <button type="button" onclick="setLanguage('ar')">AR</button>
          <button type="button" onclick="setLanguage('fr')">FR</button>
        </div>

        <button class="menu-toggle" type="button" onclick="toggleMenu()" data-key="menu_button">
          Menu
        </button>
      </div>
    </div>

    <div class="container nav-wrapper" id="mobileNav">
      <nav class="navbar">
        <a href="index.html" data-key="nav_home">Home</a>
        <a href="news.html" data-key="nav_news">News</a>
        <a href="leaks.html" data-key="nav_leaks">Leaks</a>
        <a href="players.html" data-key="nav_players">Players</a>
        <a href="builds.html" data-key="nav_builds">Builds</a>
        <a href="contact.html" data-key="nav_contact">Contact</a>
      </nav>
    </div>
  </header>

  <main class="container page-section">
    <div class="page-header">
      <span class="hero-badge" data-key="contact_badge">Contact</span>
      <h1 data-key="contact_title">Contact</h1>
      <p data-key="contact_desc">You can place your email or social media links here later.</p>
    </div>

    <div class="contact-card">
      <form class="contact-form" onsubmit="event.preventDefault(); showContactMessage();">
        <div class="form-group">
          <label for="name" data-key="contact_name">Name</label>
          <input type="text" id="name" data-placeholder-key="contact_name_placeholder" placeholder="Your name" />
        </div>

        <div class="form-group">
          <label for="email" data-key="contact_email">Email</label>
          <input type="email" id="email" data-placeholder-key="contact_email_placeholder" placeholder="Your email" />
        </div>

        <div class="form-group">
          <label for="message" data-key="contact_message">Message</label>
          <textarea id="message" rows="5" data-placeholder-key="contact_message_placeholder" placeholder="Write your message"></textarea>
        </div>

        <button type="submit" class="submit-btn" data-key="contact_send">Send</button>
        <p id="contactSuccess" class="success-message"></p>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-content">
      <p data-key="footer_text">Efootball ZONE - fan-made website for news, leaks, and player ideas.</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
