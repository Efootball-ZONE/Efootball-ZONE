<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Efootball ZONE - Julián Álvarez Build</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="builds">

  <header class="site-header">
    <div class="container topbar">
      <a href="index.html" class="brand">Efootball ZONE</a>
      <div class="header-actions">
        <div class="lang-switcher">
          <button type="button" onclick="setLanguage('en')">EN</button>
          <button type="button" onclick="setLanguage('ar')">AR</button>
          <button type="button" onclick="setLanguage('fr')">FR</button>
        </div>
        <button class="menu-toggle" type="button" onclick="toggleMenu()" data-key="menu_button">Menu</button>
      </div>
    </div>

    <div class="container nav-wrapper" id="mobileNav">
      <nav class="navbar">
        <a href="index.html" data-key="nav_home">Home</a>
        <a href="news.html" data-key="nav_news">News</a>
        <a href="leaks.html" data-key="nav_leaks">Leaks</a>
        <a href="players.html" data-key="nav_players">Players</a>
        <a href="builds.html" data-key="nav_builds">Builds</a>
        <a href="contact.html" data-key="nav_contact">Contact</a>
      </nav>
    </div>
  </header>

  <main class="container page-section">
    <section class="single-build-page">
      <div class="single-build-header">
        <span class="build-tag">Build 3</span>
        <h1 data-key="build3_title">Julián Álvarez</h1>
        <p data-key="julian_desc">Full build image for Julián Álvarez.</p>
      </div>

      <div class="single-build-image-wrap">
        <img
          src="julian-alvarez-build.jpg"
          alt="Julian Alvarez full build"
          class="single-build-image zoomable-image"
        />
      </div>

      <a href="builds.html" class="back-to-builds" data-key="back_to_builds">Back to Builds</a>
    </section>
  </main>

  <div class="image-modal" id="imageModal">
    <span class="image-modal-close" onclick="closeImageModal()">×</span>
    <img class="image-modal-content" id="modalImage" alt="Zoomed build image" />
  </div>

  <script src="script.js"></script>
</body>
</html>
